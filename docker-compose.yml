services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyberlens}
      POSTGRES_USER: ${POSTGRES_USER:-cyberlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberlens_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberlens}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      RUN_DB_MIGRATIONS: "1"
      GITHUB_FETCH_WORKERS: ${GITHUB_FETCH_WORKERS:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/auth/me/', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt

  worker:
    build: ./backend
    command: celery -A cyberlens worker -l INFO --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      GITHUB_FETCH_WORKERS: ${GITHUB_FETCH_WORKERS:-4}
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt

  realtime:
    build: ./realtime
    ports:
      - "3001:3001"
    volumes:
      - ./realtime/src:/app/src
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./realtime/package.json

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy
      realtime:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./frontend/package.json

volumes:
  pgdata:
